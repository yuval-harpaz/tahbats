<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GTFS Route Search Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body { margin:0; font-family:sans-serif; font-size:16px; }
  #controls {
    padding:10px;
    background:#f0f0f0;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:8px;
  }
  #controls input {
    font-size:16px;
    padding:8px 10px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
  }
  #search-line { width:130px; }
  #search-stop { width:200px; opacity:0.4; transition:opacity 0.2s; }
  #search-stop.active { opacity:1; }
  #search-btn {
    display:none;
    font-size:16px;
    padding:8px 18px;
    border:none;
    border-radius:6px;
    background:#1a6eff;
    color:#fff;
    cursor:pointer;
  }
  #status { flex:1; min-width:160px; font-size:0.85em; color:#333; }
  #map { height:calc(100vh - 60px); width:100%; }

  @media (max-width: 600px) {
    #controls input { font-size:16px; padding:10px 12px; }
    #search-line { width:90px; }
    #search-stop { flex:1; min-width:0; }
    #search-btn { display:inline-block; }
    #status { width:100%; flex:none; font-size:0.9em; }
    #map { height:calc(100vh - 106px); }
  }
</style>
</head>
<body>
<div id="controls">
  <input id="search-line" placeholder="Line, e.g. 277" />
  <input id="search-stop" placeholder="Filter by stop, e.g. רחובות" disabled />
  <button id="search-btn">Search</button>
  <span id="status">Loading routes…</span>
</div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API_BASE = "https://open-bus-stride-api.hasadna.org.il/route_timetable/list?line_refs=";

const map = L.map("map").setView([31.87, 34.81], 11);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom:19 }).addTo(map);

let layers = [];
let routes = [];
let currentGroups = null;

function setStatus(msg) { document.getElementById("status").textContent = msg; }
function clearLayers() { layers.forEach(l => map.removeLayer(l)); layers = []; }

function normalize(str) {
  return (str || "")
    .replace(/[\u0591-\u05C7]/g, "")
    .replace(/[\u200F\u200E\u202A-\u202E]/g, "")
    .trim();
}

function parseCsvLine(line) {
  const result = []; let current = ""; let inQuotes = false;
  for (const ch of line) {
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(current); current = ""; }
    else { current += ch; }
  }
  result.push(current);
  return result;
}

function groupByRide(data) {
  const groups = {};
  for (const p of data) {
    if (!groups[p.gtfs_ride_id]) groups[p.gtfs_ride_id] = [];
    groups[p.gtfs_ride_id].push(p);
  }
  return groups;
}

const COLORS = ["#1a6eff","#e63946","#2a9d8f","#e9c46a","#f4a261","#8338ec","#06d6a0","#ff6b6b"];

function drawRides(groups) {
  clearLayers();
  let colorIdx = 0;
  for (const points of Object.values(groups)) {
    points.sort((a,b) => new Date(a.planned_arrival_time) - new Date(b.planned_arrival_time));
    const color = COLORS[(colorIdx++) % COLORS.length];
    layers.push(L.polyline(points.map(p => [p.lat, p.lon]), { color, weight:4, opacity:0.7 }).addTo(map));
    for (const p of points) {
      layers.push(
        L.circleMarker([p.lat, p.lon], { radius:5, color })
          .bindPopup(`<b>${p.name}</b><br>${p.city}<br>${p.planned_arrival_time}`)
          .addTo(map)
      );
    }
  }
  if (layers.length) map.fitBounds(L.featureGroup(layers).getBounds(), { padding:[20,20] });
}

async function loadRoutes() {
  const res = await fetch("https://raw.githubusercontent.com/yuval-harpaz/tahbats/main/routes.txt");
  if (!res.ok) { setStatus(`Failed to load routes.txt (${res.status})`); return; }
  const text = await res.text();
  const lines = text.trim().split(/\r?\n/);
  const header = parseCsvLine(lines[0]);
  const routeIdIdx = header.indexOf("route_id");
  const shortIdx   = header.indexOf("route_short_name");
  const longIdx    = header.indexOf("route_long_name");
  routes = lines.slice(1).map(line => {
    const cols = parseCsvLine(line);
    return { route_id: cols[routeIdIdx], route_short_name: cols[shortIdx], route_long_name: cols[longIdx] };
  });
  setStatus(`Loaded ${routes.length} routes. Enter a line number.`);
}

async function fetchLine() {
  const value = document.getElementById("search-line").value.trim();
  if (!value) return;

  const lineNums = value.split(/[\s,]+/).filter(Boolean);
  const matched = routes.filter(r => lineNums.includes(r.route_short_name));
  if (!matched.length) { alert("No routes found for that line number."); return; }

  const lineRefs = [...new Set(matched.map(r => r.route_id))];
  setStatus(`Found ${matched.length} variants. Fetching stops…`);

  const res = await fetch(API_BASE + lineRefs.join(","));
  const data = await res.json();
  currentGroups = groupByRide(data);

  const stopInput = document.getElementById("search-stop");
  stopInput.disabled = false;
  stopInput.classList.add("active");

  setStatus(`Got ${Object.keys(currentGroups).length} rides. Optionally filter by stop name.`);
  applyStopFilter();
}

function applyStopFilter() {
  if (!currentGroups) return;
  const raw = normalize(document.getElementById("search-stop").value.trim());

  if (!raw) {
    drawRides(currentGroups);
    setStatus(`Showing all ${Object.keys(currentGroups).length} rides.`);
    return;
  }

  const filtered = Object.fromEntries(
    Object.entries(currentGroups).filter(([, points]) =>
      points.some(p => normalize(p.name).includes(raw) || normalize(p.city).includes(raw))
    )
  );

  if (!Object.keys(filtered).length) {
    alert(`No rides pass through stops matching "${raw}".`);
    return;
  }
  setStatus(`Showing ${Object.keys(filtered).length} rides passing through "${raw}".`);
  drawRides(filtered);
}

// Line input: trigger fetch on Enter, Tab, or blur (leaving the field)
const lineInput = document.getElementById("search-line");
lineInput.addEventListener("keydown", e => {
  if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); fetchLine(); }
});
lineInput.addEventListener("blur", () => fetchLine());

// Stop input: filter on Enter, Tab, or blur
const stopInput = document.getElementById("search-stop");
stopInput.addEventListener("keydown", e => {
  if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); applyStopFilter(); }
});
stopInput.addEventListener("blur", () => applyStopFilter());

// Mobile search button triggers whichever step is relevant
document.getElementById("search-btn").addEventListener("click", () => {
  if (!currentGroups) fetchLine();
  else applyStopFilter();
});

loadRoutes();
</script>
</body>
</html>
